name: Preprod Gate

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why you are triggering this run
        required: false
        default: manual verification
  pull_request:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/preprod-gate.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/preprod-gate.yml

jobs:
  preprod-gate:
    name: Preprod Gate / migrate-before-boot
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      DATABASE_URL: ${{ secrets.PREPROD_DATABASE_URL }}
      JWT_SECRET: ${{ secrets.PREPROD_JWT_SECRET }}
      FRONTEND_URL: https://preprod.example.com
      PORT: 8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect preprod secrets
        id: secrets
        run: |
          if [[ -n "${DATABASE_URL}" && -n "${JWT_SECRET}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Secrets present"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Preprod secrets missing; skipping migration/boot gate on this run"
          fi

      - name: Setup Node.js
        if: steps.secrets.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        if: steps.secrets.outputs.available == 'true'
        working-directory: backend
        run: npm ci

      - name: Apply DB migrations (preprod)
        if: steps.secrets.outputs.available == 'true'
        working-directory: backend
        run: npm run migrate

      - name: Start backend after migration and health-check
        if: steps.secrets.outputs.available == 'true'
        working-directory: backend
        run: |
          set -euo pipefail
          npm run start:preprod > /tmp/preprod-gate-backend.log 2>&1 &
          APP_PID=$!

          for i in $(seq 1 30); do
            if curl -sf --max-time 2 "http://127.0.0.1:${PORT}/api/health" >/tmp/preprod-gate-health.json; then
              break
            fi
            sleep 1
          done

          python3 -c "import json; d=json.load(open('/tmp/preprod-gate-health.json')); assert d.get('status')=='ok', f'health not ok: {d}'; print('PASS: preprod gate health is ok')"

          kill "$APP_PID"
